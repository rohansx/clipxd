<?xml version="1.0" encoding="UTF-8"?>
<!--
  clipxd favicon — the clay tablet mark in vector form so it scales from 16px
  (favicon) up to 512px (PWA icon) without re-sampling.  Same gradients as
  the in-app Brand SVG; safe to inline in <link rel="icon">.

  Why SVG? At 16px a raster favicon either crushes the play wedge or eats
  pixels on the highlight.  The two stacked rounded rects + a 4-stop play
  gradient survive aggressive downscaling much better.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="clipxd">
  <defs>
    <linearGradient id="fav_side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#19D7A6" />
      <stop offset="1" stop-color="#0B7E5F" />
    </linearGradient>
    <linearGradient id="fav_face" x1="0.2" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.55" stop-color="#F6EEFA" />
      <stop offset="1" stop-color="#E4D6F0" />
    </linearGradient>
    <linearGradient id="fav_play" x1="0.1" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#FFB48F" />
      <stop offset="0.45" stop-color="#FF7A59" />
      <stop offset="1" stop-color="#EF5A39" />
    </linearGradient>
    <radialGradient id="fav_spec" cx="0.32" cy="0.26" r="0.55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect x="5" y="8.5" width="30" height="28" rx="11" fill="url(#fav_side)" />
  <rect x="5" y="4.5" width="30" height="29" rx="11" fill="url(#fav_face)" />
  <path d="M11 6.5 H29 C32 6.5 33.5 8 33.5 11 V15 C29 12 11 12 6.5 15 V11 C6.5 8 8 6.5 11 6.5 Z" fill="url(#fav_spec)" opacity="0.7" />
  <path d="M16.5 13.6 L16.5 25.4 L26.6 19.9 Z" fill="#C8432A" transform="translate(0,1.6)" stroke="#C8432A" stroke-width="3" stroke-linejoin="round" />
  <path d="M16.5 13.6 L16.5 25.4 L26.6 19.9 Z" fill="url(#fav_play)" stroke="url(#fav_play)" stroke-width="3" stroke-linejoin="round" />
  <ellipse cx="18.6" cy="16.4" rx="2.1" ry="1.4" fill="#FFFFFF" opacity="0.6" transform="rotate(-32 18.6 16.4)" />
</svg>
