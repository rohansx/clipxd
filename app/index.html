<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#FF7A59" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15121C" media="(prefers-color-scheme: dark)" />

    <!-- Primary identity -->
    <title>clipxd — record once, agents read it</title>
    <meta
      name="description"
      content="clipxd is a local-first screen recorder that produces a structured, agent-queryable index alongside every video. Record once. Humans get a beautiful video. Agents get transcript, OCR, events, and chapters — queryable from the same link over MCP."
    />
    <meta name="application-name" content="clipxd" />
    <meta name="author" content="clipxd" />
    <meta name="generator" content="clipxd-web" />
    <meta name="referrer" content="origin-when-cross-origin" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="googlebot" content="index,follow" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#16C79A" />
    <link rel="canonical" href="https://clipxd.com/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord, ...) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="clipxd" />
    <meta property="og:title" content="clipxd — record once, agents read it" />
    <meta
      property="og:description"
      content="A local-first screen recorder that produces a structured, agent-queryable index alongside every video. Humans watch; agents read."
    />
    <meta property="og:url" content="https://clipxd.com/" />
    <meta property="og:image" content="https://clipxd.com/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="clipxd — a screen recording an agent can read" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:determiner" content="" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@clipxd" />
    <meta name="twitter:creator" content="@clipxd" />
    <meta name="twitter:title" content="clipxd — record once, agents read it" />
    <meta
      name="twitter:description"
      content="Local-first screen recorder. Every video ships with a structured, MCP-queryable index — transcript, OCR, events, chapters. No video leaves your device."
    />
    <meta name="twitter:image" content="https://clipxd.com/og-image.svg" />
    <meta name="twitter:image:alt" content="clipxd — a screen recording an agent can read" />

    <!-- Apple & mobile web app -->
    <meta name="apple-mobile-web-app-title" content="clipxd" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#FF7A59" />

    <!-- Icons (replaces the ugly vite default) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts (Space Grotesk + JetBrains Mono — the brand) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Structured data — SoftwareApplication schema. Crawlers that don't run JS
      (most of them) only see this. The SPA fills in dynamic metadata via
      react-helmet-async once it boots.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "clipxd",
        "alternateName": "ClipXD",
        "url": "https://clipxd.com/",
        "applicationCategory": "MultimediaApplication",
        "applicationSubCategory": "Screen Recorder",
        "operatingSystem": "Linux, macOS, Windows, Web",
        "browserRequirements": "Requires a modern browser with WebRTC getDisplayMedia support",
        "description": "clipxd is a local-first screen recorder that produces a structured, agent-queryable index alongside every video. Humans watch; agents read.",
        "image": "https://clipxd.com/og-image.svg",
        "screenshot": "https://clipxd.com/og-image.svg",
        "downloadUrl": "https://github.com/rohansx/clipxd",
        "softwareVersion": "0.1.0",
        "softwareRequirements": "Node.js 18+ for the web build; Rust toolchain for the recorder",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "license": "https://www.apache.org/licenses/LICENSE-2.0",
        "creator": {
          "@type": "Organization",
          "name": "clipxd",
          "url": "https://github.com/rohansx/clipxd"
        },
        "featureList": [
          "Local-first screen recording",
          "Cursor + click + keystroke capture",
          "Local whisper.cpp transcription",
          "On-screen text OCR",
          "Visual-event salience gate (veyo)",
          "CloakPipe PII redaction",
          "MCP-queryable index per clip",
          "JSON sidecar for non-MCP agents",
          "Loom, Cap, and YouTube URL imports"
        ],
        "keywords": "screen recorder, MCP, AI agent, OCR, whisper.cpp, local-first, Apache-2.0, open core, transcript, index"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "clipxd",
        "url": "https://clipxd.com/",
        "logo": "https://clipxd.com/favicon.svg",
        "sameAs": [
          "https://github.com/rohansx/clipxd"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>clipxd — record once, agents read it</h1>
      <p>
        clipxd is a local-first screen recorder that produces a structured, agent-queryable
        index alongside every video. This page is a single-page application — please enable
        JavaScript to record, import, and query clips.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
